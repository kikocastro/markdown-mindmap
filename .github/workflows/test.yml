name: test
on:
  push:
  pull_request:
permissions:
  contents: write
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run build
      - name: Update coverage badge
        if: github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: we-cli/coverage-badge-action@8f6b0bd1b727cde6212c8c62d3329c4aac09fec3 # v1.0.1

  # ponytail: native GHSA-backed scan (includes malware advisories), PRs only.
  # Upgrade to Socket if you want behavioral npm-malware detection.
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    # Real gate. Requires Dependency graph (Settings > Code security), now enabled.
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: actions/dependency-review-action@v5
